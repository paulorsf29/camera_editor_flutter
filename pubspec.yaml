name: camera_editor_project
description: "Aplicativo Flutter para captura de imagem e detecção de bordas."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  image: ^4.2.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.0+1
  intl: ^0.19.0
  image_gallery_saver_plus: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true